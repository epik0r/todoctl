# .github/workflows/changelog-on-tag.yml
name: Update changelog on tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main branch with full history
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Generate CHANGELOG.md with git-cliff
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --output CHANGELOG.md
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit updated changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
            exit 0
          fi

          git commit -m "docs(changelog): update CHANGELOG.md for ${GITHUB_REF_NAME}"

      - name: Push changelog update to main
        run: git push origin HEAD:main
